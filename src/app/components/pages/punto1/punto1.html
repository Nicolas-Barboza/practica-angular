<div class="container text-center mt-5">

  <h2>{{ eventos[indiceActual].nombre }}</h2>

  <img
    [src]="eventos[indiceActual].img"
    class="img-fluid rounded"
    style="max-height: 300px;"
  />

  <p class="mt-3">
    {{ eventos[indiceActual].descripcion }}
  </p>

  <div class="mt-4">
    <button class="btn btn-secondary me-2" (click)="anterior()">
      Anterior
    </button>

    <button class="btn btn-primary" (click)="siguiente()">
      Siguiente
    </button>
  </div>

</div>
